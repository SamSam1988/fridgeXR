<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>FridgeXR v6</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;touch-action:none}
  #cam{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;background:#000}
  #world{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity .28s ease}
  body.xr #world{opacity:1}

  /* This is deliberately NOT a black window. It is a transparent material-replacement field. */
  #field{
    position:absolute;left:50%;top:48%;width:min(76vw,620px);height:min(62vh,760px);
    transform:translate(-50%,-50%);
    border-radius:28%/18%;
    overflow:hidden;
    background:
      radial-gradient(ellipse at 52% 44%, rgba(255,230,150,.20) 0%, rgba(255,230,150,.08) 23%, rgba(255,255,255,.05) 44%, rgba(255,255,255,0) 72%),
      linear-gradient(90deg,rgba(255,255,255,.13),rgba(255,255,255,.035) 18%,rgba(255,255,255,.02) 75%,rgba(255,255,255,.12));
    box-shadow:
      inset 0 0 0 1px rgba(255,215,90,.35),
      inset 0 0 60px rgba(255,210,80,.13),
      0 0 28px rgba(255,200,60,.10);
    backdrop-filter: blur(1.2px) saturate(.68) contrast(.76) brightness(1.08);
    -webkit-backdrop-filter: blur(1.2px) saturate(.68) contrast(.76) brightness(1.08);
    mask-image:radial-gradient(ellipse at center,#000 0%,#000 55%,rgba(0,0,0,.7) 70%,rgba(0,0,0,0) 88%);
    -webkit-mask-image:radial-gradient(ellipse at center,#000 0%,#000 55%,rgba(0,0,0,.7) 70%,rgba(0,0,0,0) 88%);
  }
  #field:before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:
      linear-gradient(90deg,transparent 0 7%,rgba(255,255,255,.20) 8%,transparent 10% 89%,rgba(255,255,255,.15) 91%,transparent 94%),
      radial-gradient(ellipse at center,transparent 0 55%,rgba(0,0,0,.10) 85%);
    mix-blend-mode:screen;
  }
  #field:after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(120deg,transparent 8%,rgba(255,255,255,.18) 12%,transparent 19%,transparent 58%,rgba(255,255,255,.12) 62%,transparent 69%);
    opacity:.45;mix-blend-mode:screen;
  }

  .chandelier{position:absolute;left:50%;top:49%;height:94%;width:auto;transform:translate(-50%,-50%) scale(1);transform-origin:center;filter:drop-shadow(0 12px 20px rgba(0,0,0,.28)) saturate(1.12) contrast(1.05);opacity:.96;mix-blend-mode:normal}
  .ghost{position:absolute;left:50%;top:49%;height:96%;width:auto;transform:translate(-50%,-50%);opacity:.16;filter:blur(10px) saturate(1.4);mix-blend-mode:screen}

  /* very faint occlusion ribs so the object feels inside the existing fridge volume, not pasted on top */
  #occlusion{position:absolute;inset:0;pointer-events:none;background:linear-gradient(90deg,rgba(0,0,0,.18) 0 4%,transparent 5% 91%,rgba(0,0,0,.18) 96%),linear-gradient(0deg,rgba(0,0,0,.08),transparent 20% 80%,rgba(0,0,0,.12));mix-blend-mode:multiply;opacity:.5}

  #status{position:fixed;top:calc(14px + env(safe-area-inset-top));left:14px;z-index:4;padding:10px 15px;border-radius:999px;background:rgba(0,0,0,.42);color:#fff;font-weight:700;font-size:16px;backdrop-filter:blur(10px)}
  #hint{position:fixed;top:calc(14px + env(safe-area-inset-top));right:14px;z-index:4;padding:10px 13px;border-radius:999px;background:rgba(0,0,0,.32);color:#fff;font-size:14px;backdrop-filter:blur(10px)}
  #ui{position:fixed;left:0;right:0;bottom:calc(20px + env(safe-area-inset-bottom));display:flex;justify-content:center;gap:14px;z-index:4}
  button{border:0;border-radius:999px;padding:18px 42px;background:linear-gradient(#ffdc69,#d9a51e);color:#111;font-weight:900;font-size:22px;letter-spacing:.04em;box-shadow:0 10px 35px rgba(0,0,0,.38)}
  #cal{padding:14px 20px;font-size:15px;background:rgba(20,20,20,.55);color:white;border:1px solid rgba(255,255,255,.22);font-weight:700;letter-spacing:0}
  #guide{position:fixed;inset:0;border:2px dashed rgba(255,214,88,.75);border-radius:28%/18%;width:min(76vw,620px);height:min(62vh,760px);left:50%;top:48%;transform:translate(-50%,-50%);opacity:0;pointer-events:none;z-index:3;box-shadow:0 0 0 9999px rgba(0,0,0,.08)}
  body.cal #guide{opacity:1}
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<div id="world">
  <div id="field">
    <img class="ghost" id="glow" src="assets/chandelier_main.png" alt="">
    <img class="chandelier" id="chandelier" src="assets/chandelier_main.png" alt="golden dilution refrigerator interior">
    <div id="occlusion"></div>
  </div>
</div>
<div id="guide"></div>
<div id="status">LIVE</div><div id="hint">Aim at fridge, tap XRAY</div>
<div id="ui"><button id="cal">Calibrate</button><button id="toggle">XRAY</button></div>
<script>
const cam=document.getElementById('cam'), body=document.body, statusEl=document.getElementById('status');
const field=document.getElementById('field'), guide=document.getElementById('guide');
const img=document.getElementById('chandelier'), glow=document.getElementById('glow');
let on=false, cal=false, px=0, py=0, gamma=0, beta=0;
let box={x:50,y:48,w:76,h:62};
const variants=['assets/chandelier_main.png','assets/chandelier_alt1.png','assets/chandelier_alt2.png'];
let variant=0;
async function start(){
  try{cam.srcObject=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false});}
  catch(e){statusEl.textContent='Camera blocked'; alert('Camera needs HTTPS and permission. '+e.message)}
}
start();
function place(){
  const w=Math.min(window.innerWidth*box.w/100,620), h=Math.min(window.innerHeight*box.h/100,760);
  for(const el of [field,guide]){el.style.left=box.x+'%';el.style.top=box.y+'%';el.style.width=w+'px';el.style.height=h+'px';}
}
place(); addEventListener('resize',place);
function render(){
  const dx=gamma*1.25 + px*18;
  const dy=beta*.35 + py*16;
  const rot=gamma*.08 + px*2.5;
  const s=1.03 + Math.abs(gamma)*.0015 + Math.abs(px)*.015;
  img.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px)) rotate(${rot}deg) scale(${s})`;
  glow.style.transform=`translate(calc(-50% + ${dx*.55}px),calc(-50% + ${dy*.55}px)) scale(${s*1.05})`;
  requestAnimationFrame(render);
}
render();
addEventListener('deviceorientation',e=>{gamma=e.gamma||0; beta=e.beta||0;});
addEventListener('pointermove',e=>{px=e.clientX/innerWidth-.5; py=e.clientY/innerHeight-.5;});

document.getElementById('toggle').onclick=()=>{on=!on; body.classList.toggle('xr',on); statusEl.textContent=on?'XRAY: FRIDGE STILL IN ROOM':'LIVE'; if(on){variant=(variant+1)%variants.length; img.src=variants[variant]; glow.src=variants[variant];}};
document.getElementById('cal').onclick=()=>{cal=!cal; body.classList.toggle('cal',cal); document.getElementById('cal').textContent=cal?'Done':'Calibrate'};
let dragging=false, sx=0, sy=0, startBox=null;
addEventListener('pointerdown',e=>{if(!cal)return; dragging=true; sx=e.clientX; sy=e.clientY; startBox={...box};});
addEventListener('pointerup',()=>dragging=false);
addEventListener('pointermove',e=>{if(!cal||!dragging)return; box.x=startBox.x+(e.clientX-sx)/innerWidth*100; box.y=startBox.y+(e.clientY-sy)/innerHeight*100; place();});
addEventListener('wheel',e=>{if(!cal)return; e.preventDefault(); box.w=Math.max(35,Math.min(96,box.w-e.deltaY*.03)); box.h=Math.max(30,Math.min(90,box.h-e.deltaY*.03)); place();},{passive:false});
</script>
</body>
</html>
