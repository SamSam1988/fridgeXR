<title>DilFridge X-Ray</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: #000; overflow: hidden;
    touch-action: none; user-select: none; -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: #fff;
  }
  #v {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; background: #111;
  }
  #o {
    position: absolute; top: 50%; left: 50%;
    transform-origin: center center;
    will-change: transform; touch-action: none;
  }
  #o {
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  #o.visible { opacity: 1; }
  #o img {
    display: block; height: 72vh; width: auto;
    filter: drop-shadow(0 4px 30px rgba(0,0,0,0.6)) saturate(1.1);
    pointer-events: none;
  }
  #hint {
    position: absolute; left: 0; right: 0;
    bottom: env(safe-area-inset-bottom, 0);
    padding: 14px 18px calc(14px + env(safe-area-inset-bottom, 0));
    text-align: center;
    background: linear-gradient(transparent, rgba(0,0,0,0.55));
    pointer-events: none;
    transition: opacity 1.5s ease;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  }
  #hint.gone { opacity: 0; }
  #err {
    position: absolute; inset: 0;
    display: none; align-items: center; justify-content: center;
    padding: 24px; text-align: center; background: rgba(0,0,0,0.75);
    font-size: 15px; line-height: 1.5;
  }
  #err.show { display: flex; }
</style>

<div id="hint">Drag, pinch, twist to align with your fridge</div>
<div id="err"></div>

<script>
(() => {
  const KEY = 'dilfridge_xray_min_v1';
  const saved = JSON.parse(localStorage.getItem(KEY) || 'null') || {};
  const S = { tx: saved.tx || 0, ty: saved.ty || 0, scale: saved.scale || 1, rot: saved.rot || 0 };

  const v = document.getElementById('v');
  const o = document.getElementById('o');
  const hint = document.getElementById('hint');
  const err = document.getElementById('err');

  function apply() {
    o.style.transform = `translate(-50%, -50%) translate(${S.tx}px, ${S.ty}px) scale(${S.scale}) rotate(${S.rot}deg)`;
  }
  apply();

  function save() { localStorage.setItem(KEY, JSON.stringify(S)); }

  // Camera
  async function startCam() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });
      v.srcObject = stream;
    } catch (e) {
      let msg = 'Camera unavailable: ' + (e && e.message ? e.message : e);
      if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
        msg += '<br><br>This page must be served over HTTPS for the camera to work. Open it on Netlify, GitHub Pages, or any HTTPS host.';
      } else {
        msg += '<br><br>Tap to retry, or check your browser permissions.';
      }
      err.innerHTML = msg;
      err.classList.add('show');
      err.addEventListener('click', () => { err.classList.remove('show'); startCam(); }, { once: true });
    }
  }
  startCam();

  // Fade hint after 6 seconds
  setTimeout(() => hint.classList.add('gone'), 6000);

  // --- Fridge-presence detection ---
  // Two cues, both must agree, to keep the overlay specific to the fridge:
  //   (1) Whiteness: a sizeable central region is bright + desaturated
  //       (the white enclosure).
  //   (2) Edge density: that same region has many edges (handles, BLUEFORS
  //       label, frame slots, retention clips). Plain walls/floor fail this.
  const detCanvas = document.createElement('canvas');
  detCanvas.width = 80; detCanvas.height = 120;
  const dctx = detCanvas.getContext('2d', { willReadFrequently: true });
  let visible = false;
  let lastChange = 0;
  // Sample a centred rectangle.
  const SX = Math.floor(detCanvas.width * 0.20);
  const SY = Math.floor(detCanvas.height * 0.15);
  const SW = Math.floor(detCanvas.width * 0.60);
  const SH = Math.floor(detCanvas.height * 0.70);
  // Thresholds chosen so a bare wall (high whiteness, low edges) and a
  // textured non-white scene (low whiteness, high edges) both fail.
  const WHITE_ON     = 0.22;
  const WHITE_OFF    = 0.12;
  const EDGES_ON     = 0.18;   // fraction of pixels that are edges
  const EDGES_OFF    = 0.10;
  const COOLDOWN_MS  = 500;

  function score() {
    dctx.drawImage(v, 0, 0, detCanvas.width, detCanvas.height);
    const img = dctx.getImageData(SX, SY, SW, SH).data;
    // Pre-compute luminance grid for edge calc.
    const lum = new Uint8Array(SW * SH);
    let white = 0;
    for (let y = 0; y < SH; y++) {
      for (let x = 0; x < SW; x++) {
        const i = (y * SW + x) * 4;
        const r = img[i], g = img[i+1], b = img[i+2];
        lum[y * SW + x] = (r * 0.299 + g * 0.587 + b * 0.114) | 0;
        if (r > 165 && g > 165 && b > 165) {
          const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
          if (mx - mn < 38) white++;
        }
      }
    }
    let edges = 0;
    let edgeable = 0;
    for (let y = 0; y < SH - 1; y++) {
      for (let x = 0; x < SW - 1; x++) {
        const c = lum[y * SW + x];
        const r = lum[y * SW + x + 1];
        const d = lum[(y + 1) * SW + x];
        if (Math.abs(c - r) + Math.abs(c - d) > 50) edges++;
        edgeable++;
      }
    }
    return { white: white / (SW * SH), edges: edges / edgeable };
  }

  function tick() {
    if (v.readyState >= 2 && v.videoWidth) {
      const s = score();
      const now = Date.now();
      const fridgeLike = (s.white > WHITE_ON) && (s.edges > EDGES_ON);
      const notFridge  = (s.white < WHITE_OFF) || (s.edges < EDGES_OFF);
      if (!visible && fridgeLike && now - lastChange > COOLDOWN_MS) {
        visible = true; o.classList.add('visible'); lastChange = now;
        hint.classList.add('gone');
      } else if (visible && notFridge && now - lastChange > COOLDOWN_MS) {
        visible = false; o.classList.remove('visible'); lastChange = now;
      }
    }
    requestAnimationFrame(tick);
  }
  v.addEventListener('playing', () => requestAnimationFrame(tick), { once: true });

  // Gesture handling
  const pts = new Map();
  let g = null;

  function down(e) {
    e.preventDefault();
    o.setPointerCapture(e.pointerId);
    pts.set(e.pointerId, { x: e.clientX, y: e.clientY });
    begin();
    hint.classList.add('gone');
  }
  function move(e) {
    if (!pts.has(e.pointerId)) return;
    pts.set(e.pointerId, { x: e.clientX, y: e.clientY });
    upd();
  }
  function up(e) {
    if (!pts.has(e.pointerId)) return;
    pts.delete(e.pointerId);
    if (pts.size === 0) { g = null; save(); }
    else begin();
  }

  function begin() {
    if (pts.size === 1) {
      const [p] = pts.values();
      g = { kind: 'pan', sx: p.x, sy: p.y, tx: S.tx, ty: S.ty };
    } else if (pts.size >= 2) {
      const [a, b] = [...pts.values()];
      const dx = b.x - a.x, dy = b.y - a.y;
      g = {
        kind: 'pinch',
        sd: Math.hypot(dx, dy),
        sa: Math.atan2(dy, dx),
        sscale: S.scale, srot: S.rot,
        tx: S.tx, ty: S.ty,
      };
    }
  }

  function upd() {
    if (!g) return;
    if (g.kind === 'pan' && pts.size === 1) {
      const [p] = pts.values();
      S.tx = g.tx + (p.x - g.sx);
      S.ty = g.ty + (p.y - g.sy);
    } else if (g.kind === 'pinch' && pts.size >= 2) {
      const [a, b] = [...pts.values()];
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.hypot(dx, dy);
      const ang = Math.atan2(dy, dx);
      S.scale = Math.max(0.1, Math.min(8, g.sscale * (d / g.sd)));
      S.rot = g.srot + (ang - g.sa) * 180 / Math.PI;
    }
    apply();
  }

  o.addEventListener('pointerdown', down);
  o.addEventListener('pointermove', move);
  o.addEventListener('pointerup', up);
  o.addEventListener('pointercancel', up);

  // Block iOS native pinch-zoom on the page itself
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('touchmove', e => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });

  // Double-tap on the overlay resets alignment
  let lastTap = 0;
  o.addEventListener('pointerup', (e) => {
    const now = Date.now();
    if (now - lastTap < 300) {
      S.tx = 0; S.ty = 0; S.scale = 1; S.rot = 0;
      apply(); save();
    }
    lastTap = now;
  });
})();
</script>
