<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<title>FridgeXR v7</title>
<style>
:root{--gold:#f1c64c;--ink:#050505}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}#cam{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;background:#000}.fx{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity .18s ease}.xray .fx.ready{opacity:1}#softErase{background:radial-gradient(ellipse at var(--cx,50%) var(--cy,50%),rgba(218,218,205,.24) 0%,rgba(218,218,205,.19) 21%,rgba(218,218,205,.10) 39%,rgba(218,218,205,0) 62%);mix-blend-mode:screen;filter:blur(7px)}#glass{background:radial-gradient(ellipse at var(--cx,50%) var(--cy,50%),rgba(255,255,255,.18),rgba(255,255,255,.05) 34%,rgba(255,255,255,0) 61%),linear-gradient(105deg,rgba(255,255,255,0) 30%,rgba(255,255,255,.22) 47%,rgba(255,255,255,0) 58%);mix-blend-mode:screen;opacity:0}.xray #glass.ready{opacity:.55}#scene{position:fixed;left:var(--cx,50%);top:var(--cy,50%);width:min(58vw,430px);height:min(76vh,680px);transform:translate(-50%,-50%);pointer-events:none;opacity:0;transition:opacity .18s ease,filter .18s ease;filter:drop-shadow(0 0 18px rgba(245,190,55,.36)) contrast(1.07) saturate(1.12)}.xray #scene.ready{opacity:.88}.layer{position:absolute;left:50%;top:50%;max-width:none;transform-origin:center;will-change:transform}.glow{width:115%;opacity:.55;mix-blend-mode:screen}.main{width:100%;opacity:.92}.alt{width:86%;opacity:.24;mix-blend-mode:screen;filter:blur(.35px)}#vignette{background:radial-gradient(circle at var(--cx,50%) var(--cy,50%),rgba(255,220,90,0) 0%,rgba(0,0,0,0) 45%,rgba(0,0,0,.18) 100%);opacity:0}.xray #vignette.ready{opacity:1}#ui{position:fixed;left:0;right:0;bottom:calc(18px + env(safe-area-inset-bottom));z-index:20;display:flex;justify-content:center;gap:12px;padding:0 16px}.btn{border:0;border-radius:999px;padding:16px 25px;font-size:18px;font-weight:800;background:rgba(20,20,20,.62);color:white;backdrop-filter:blur(14px);box-shadow:0 8px 26px rgba(0,0,0,.35)}.btn.gold{background:linear-gradient(#ffd95b,#c9961b);color:#111}.hidden{display:none}#top{position:fixed;top:calc(14px + env(safe-area-inset-top));left:14px;right:14px;z-index:20;display:flex;gap:10px;align-items:center;justify-content:space-between}.pill{padding:10px 14px;border-radius:999px;background:rgba(0,0,0,.54);color:#fff;backdrop-filter:blur(14px);font-size:15px}#reticle{position:fixed;left:50%;top:48%;width:min(54vw,400px);height:min(66vh,620px);transform:translate(-50%,-50%);border:2px dashed rgba(255,214,83,.75);border-radius:46%/8%;opacity:.0;pointer-events:none;z-index:12}.armed #reticle{opacity:.75}.locked #reticle{opacity:.18;border-style:solid}.hint{position:fixed;left:16px;right:16px;bottom:calc(92px + env(safe-area-inset-bottom));z-index:20;text-align:center;color:white;text-shadow:0 2px 12px #000;font-size:15px;line-height:1.25;opacity:.95}.locked .hint{opacity:.0}.lost .hint{opacity:.95}#debug{display:none}</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<div id="softErase" class="fx"></div>
<div id="glass" class="fx"></div>
<div id="scene">
  <img class="layer glow" src="assets/chandelier_glow.png">
  <img class="layer alt altA" src="assets/chandelier_alt_a.png">
  <img class="layer main" src="assets/chandelier_photo.png">
  <img class="layer alt altB" src="assets/chandelier_alt_b.png">
</div>
<div id="vignette" class="fx"></div>
<div id="reticle"></div>
<div id="top"><div id="status" class="pill">LIVE</div><button id="lock" class="btn hidden">LOCK ON FRIDGE</button></div>
<div class="hint" id="hint">Press XRAY, point at the closed fridge, then tap LOCK. The cutaway appears only while you keep looking at that direction.</div>
<div id="ui"><button id="live" class="btn">LIVE</button><button id="xray" class="btn gold">XRAY</button></div>
<script>
const body=document.body, statusEl=document.getElementById('status'), lockBtn=document.getElementById('lock');
const scene=document.getElementById('scene'), layers=[...document.querySelectorAll('.layer')], fx=[...document.querySelectorAll('.fx'),scene];
let mode='live', locked=false, lockOri=null, cur={a:0,b:0,g:0}, lastPointer={x:innerWidth/2,y:innerHeight/2}, ready=false;
async function camera(){try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false});cam.srcObject=s;}catch(e){statusEl.textContent='CAMERA BLOCKED';alert('Camera needs HTTPS and permission. '+e.message)}}camera();
async function enableMotion(){try{if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){await DeviceOrientationEvent.requestPermission();}}catch(e){}}
window.addEventListener('deviceorientation',e=>{cur={a:e.alpha||0,b:e.beta||0,g:e.gamma||0};render();});
window.addEventListener('pointermove',e=>{lastPointer={x:e.clientX,y:e.clientY}; if(!locked) setCenter(e.clientX,e.clientY); render();});
function setCenter(x,y){document.documentElement.style.setProperty('--cx',(x/innerWidth*100)+'%');document.documentElement.style.setProperty('--cy',(y/innerHeight*100)+'%')}
function deltaAngle(a,b){let d=Math.abs(a-b)%360;return d>180?360-d:d}
function visible(){if(mode!=='xray'||!locked)return false;if(!lockOri)return false;const dA=deltaAngle(cur.a,lockOri.a), dB=Math.abs(cur.b-lockOri.b), dG=Math.abs(cur.g-lockOri.g);return dA<18&&dB<16&&dG<18}
function render(){const ok=visible();fx.forEach(el=>el.classList.toggle('ready',ok));body.classList.toggle('lost',mode==='xray'&&locked&&!ok);if(mode==='xray'&&locked)statusEl.textContent=ok?'XRAY LOCKED':'XRAY: LOOK BACK AT FRIDGE';
 const dx=locked?(cur.g-(lockOri?.g||0))*2.2:(lastPointer.x/innerWidth-.5)*34; const dy=locked?(cur.b-(lockOri?.b||0))*1.15:(lastPointer.y/innerHeight-.5)*34; const z=1.03+Math.min(Math.abs(dx)*.0025,.08); const rot=dx*.05;
 scene.style.transform=`translate(-50%,-50%) translate(${dx}px,${dy}px) scale(${z}) rotate(${rot}deg)`;
 layers[0].style.transform=`translate(-50%,-50%) translate(${-dx*.65}px,${-dy*.45}px) scale(1.16)`;
 layers[1].style.transform=`translate(-50%,-50%) translate(${-dx*.38}px,${-dy*.22}px) scale(.98)`;
 layers[2].style.transform=`translate(-50%,-50%) translate(${-dx*.18}px,${-dy*.10}px) scale(1.0)`;
 layers[3].style.transform=`translate(-50%,-50%) translate(${dx*.18}px,${dy*.10}px) scale(.88)`;
}
document.getElementById('xray').onclick=async()=>{await enableMotion();mode='xray';locked=false;lockOri=null;body.className='armed xray';statusEl.textContent='XRAY ARMED';lockBtn.classList.remove('hidden');render()};
document.getElementById('live').onclick=()=>{mode='live';locked=false;body.className='';statusEl.textContent='LIVE';lockBtn.classList.add('hidden');fx.forEach(el=>el.classList.remove('ready'))};
lockBtn.onclick=()=>{locked=true;lockOri={...cur};body.className='xray locked';lockBtn.classList.add('hidden');setCenter(innerWidth/2,innerHeight*.48);render()};
setInterval(()=>{if(visible()){const t=Date.now()/1000;scene.style.filter=`drop-shadow(0 0 ${18+Math.sin(t*2)*5}px rgba(245,190,55,.36)) contrast(1.07) saturate(1.12)`}},60);
</script>
</body>
</html>
