<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>fridgeXR v14</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;touch-action:none}
  #cam{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;background:#000;z-index:0}
  #ar{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
  #badge{position:fixed;left:16px;top:calc(14px + env(safe-area-inset-top));z-index:5;padding:12px 16px;border-radius:999px;background:rgba(0,0,0,.46);color:#fff;font-weight:900;font-size:18px;backdrop-filter:blur(12px)}
  body.xr #badge{color:#ffd84f;border:1px solid rgba(255,216,79,.35)}
  #hint{position:fixed;right:14px;top:calc(14px + env(safe-area-inset-top));z-index:5;padding:10px 14px;border-radius:999px;background:rgba(0,0,0,.42);color:#fff;font-size:15px;font-weight:800;backdrop-filter:blur(12px)}
  body.xr #hint{display:none}
  #ui{position:fixed;left:0;right:0;bottom:calc(22px + env(safe-area-inset-bottom));display:flex;justify-content:center;z-index:5;pointer-events:auto}
  #xray{border:0;border-radius:999px;background:linear-gradient(#ffdd67,#d6a51c);color:#17120a;font-size:28px;font-weight:1000;letter-spacing:.03em;padding:19px 56px;box-shadow:0 12px 38px rgba(0,0,0,.40)}
  body.xr #xray{background:linear-gradient(#fff0a6,#e0b631)}
  #start{position:fixed;inset:auto 20px calc(105px + env(safe-area-inset-bottom)) 20px;z-index:6;border:0;border-radius:18px;background:#111;color:#fff;padding:16px;font-size:19px;font-weight:800;display:none}
  #probe{display:none}
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<canvas id="ar"></canvas>
<canvas id="probe" width="180" height="260"></canvas>
<img id="our" src="assets/our_fridge.jpg" style="display:none" />
<div id="badge">LIVE</div>
<div id="hint">camera view</div>
<button id="start">Start camera</button>
<div id="ui"><button id="xray">XRAY</button></div>
<script>
const video=document.getElementById('cam');
const ar=document.getElementById('ar');
const ctx=ar.getContext('2d');
const probe=document.getElementById('probe');
const pctx=probe.getContext('2d',{willReadFrequently:true});
const our=document.getElementById('our');
const badge=document.getElementById('badge');
const startBtn=document.getElementById('start');
const body=document.body;
let xr=false, running=false, frame=0;
let box={cx:.50,cy:.50,w:.38,h:.58,conf:0};
let target={...box};
let orient={g:0,b:55};

function sizeCanvas(){ar.width=innerWidth*devicePixelRatio;ar.height=innerHeight*devicePixelRatio;ar.style.width=innerWidth+'px';ar.style.height=innerHeight+'px';ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)}
addEventListener('resize',sizeCanvas); sizeCanvas();

async function startCamera(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false});
    video.srcObject=s; running=true; startBtn.style.display='none'; badge.textContent=xr?'XRAY ON':'LIVE';
  }catch(e){startBtn.style.display='block'; badge.textContent='CAMERA NEEDED';}
}
startBtn.onclick=startCamera; startCamera();

document.getElementById('xray').onclick=()=>{xr=!xr;body.classList.toggle('xr',xr);badge.textContent=xr?'XRAY ON':'LIVE'};
addEventListener('deviceorientation',e=>{orient.g=e.gamma||0; orient.b=e.beta||55});

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function lerp(a,b,t){return a+(b-a)*t}

function detectCan(){
  if(video.readyState<2) return null;
  const W=probe.width,H=probe.height;
  pctx.drawImage(video,0,0,W,H);
  const data=pctx.getImageData(0,0,W,H).data;
  let rows=new Array(H).fill(0), cols=new Array(W).fill(0), total=0;
  for(let y=Math.floor(H*.16);y<Math.floor(H*.88);y++){
    for(let x=Math.floor(W*.10);x<Math.floor(W*.92);x++){
      const i=(y*W+x)*4,r=data[i],g=data[i+1],b=data[i+2];
      const max=Math.max(r,g,b),min=Math.min(r,g,b),sat=(max-min)/(max+1),val=max/255;
      // Silver/gray OVC: low saturation, mid/high brightness. Avoid pure white walls by requiring some local contrast later.
      if(sat<.18 && val>.30 && val<.86){
        rows[y]++; cols[x]++; total++;
      }
    }
  }
  if(total<800) return null;
  const colThresh=H*.075, rowThresh=W*.07;
  let minX=0,maxX=W-1,minY=0,maxY=H-1;
  while(minX<W && cols[minX]<colThresh) minX++;
  while(maxX>0 && cols[maxX]<colThresh) maxX--;
  while(minY<H && rows[minY]<rowThresh) minY++;
  while(maxY>0 && rows[maxY]<rowThresh) maxY--;
  const ww=(maxX-minX)/W, hh=(maxY-minY)/H;
  if(ww<.18 || hh<.25) return null;
  let cx=(minX+maxX)/(2*W), cy=(minY+maxY)/(2*H);
  // Bias toward physical cryostat: middle-upper, not full wall.
  ww=clamp(ww*.92,.26,.54); hh=clamp(hh*.95,.42,.72); cx=clamp(cx,.25,.75); cy=clamp(cy,.36,.64);
  return {cx,cy,w:ww,h:hh,conf:Math.min(1,total/(W*H*.18))};
}

function roundCanPath(c,x,y,w,h){
  const r=w*.45, top=h*.105, bot=h*.06;
  c.beginPath();
  c.moveTo(x+r,y);
  c.bezierCurveTo(x+w,y,x+w,y+top,x+w,y+top*1.25);
  c.lineTo(x+w,y+h-bot);
  c.bezierCurveTo(x+w,y+h,x+w-r*.55,y+h,x+w*.50,y+h);
  c.bezierCurveTo(x+r*.55,y+h,x,y+h,x,y+h-bot);
  c.lineTo(x,y+top*1.25);
  c.bezierCurveTo(x,y+top,x,y,x+r,y);
  c.closePath();
}

function drawDressedCan(){
  const W=innerWidth,H=innerHeight;
  const x=(box.cx-box.w/2)*W, y=(box.cy-box.h/2)*H, w=box.w*W, h=box.h*H;
  const tilt=clamp(orient.g/45,-1,1);
  ctx.save();
  roundCanPath(ctx,x,y,w,h);
  ctx.clip();

  // Suppress only the silver can under the photo, not the whole screen.
  ctx.save();
  ctx.globalAlpha=.30;
  ctx.filter='blur(8px) brightness(1.12) saturate(.80)';
  ctx.drawImage(video,x-w*.08,y-h*.04,w*1.16,h*1.10,x-w*.02,y,w*1.04,h);
  ctx.restore();

  // Warm glass wash so the closed can becomes invisible behind OUR open-fridge image.
  const grad=ctx.createLinearGradient(0,y,0,y+h);
  grad.addColorStop(0,'rgba(238,232,205,.28)');
  grad.addColorStop(.45,'rgba(224,214,178,.16)');
  grad.addColorStop(1,'rgba(110,90,35,.10)');
  ctx.fillStyle=grad; ctx.fillRect(x,y,w,h);

  // Draw OUR fridge photo, clipped to the can. Top plate is intentionally attached close to the top.
  const iw=our.naturalWidth, ih=our.naturalHeight;
  // crop central part of uploaded open-fridge photo; keep cold plates and wiring, remove excess room.
  const sx=iw*.16, sy=ih*.02, sw=iw*.68, sh=ih*.92;
  const drawW=w*(1.10+Math.abs(tilt)*.10), drawH=h*1.08;
  const dx=x+w*.50-drawW*.50 + tilt*w*.055;
  const dy=y-h*.045;
  ctx.globalAlpha=.94;
  ctx.filter='contrast(1.08) saturate(1.16) brightness(1.03) drop-shadow(0 3px 6px rgba(0,0,0,.32))';
  ctx.drawImage(our,sx,sy,sw,sh,dx,dy,drawW,drawH);

  // Add top mechanical join: this makes the chandelier look attached to the top flange, not floating.
  ctx.globalAlpha=.68;
  ctx.filter='none';
  ctx.strokeStyle='rgba(255,220,95,.70)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(x+w*.5,y+h*.075,w*.43,h*.030,tilt*.06,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='rgba(255,205,70,.10)'; ctx.fill();

  // Soft glass reflection edge, extremely subtle.
  ctx.globalAlpha=.18;
  ctx.strokeStyle='rgba(255,255,255,.85)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(x+w*.12,y+h*.04); ctx.lineTo(x+w*.05,y+h*.82); ctx.stroke();
  ctx.restore();
}

function loop(){
  frame++;
  ctx.clearRect(0,0,innerWidth,innerHeight);
  if(xr && our.complete){
    if(frame%8===0){
      const d=detectCan();
      if(d) target=d;
      // If no detection yet, safe default around the usual closed-can volume. Never black screen.
    }
    box.cx=lerp(box.cx,target.cx,.14); box.cy=lerp(box.cy,target.cy,.14); box.w=lerp(box.w,target.w,.12); box.h=lerp(box.h,target.h,.12);
    drawDressedCan();
  }
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
