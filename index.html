<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>FridgeXR v12</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:system-ui,-apple-system,Segoe UI,sans-serif;touch-action:none}
  canvas{position:fixed;inset:0;width:100vw;height:100vh;background:#000}
  video{display:none}
  #ui{position:fixed;left:0;right:0;bottom:calc(20px + env(safe-area-inset-bottom));display:flex;justify-content:center;gap:18px;z-index:5;pointer-events:none}
  button{pointer-events:auto;border:0;border-radius:999px;padding:18px 46px;font-size:24px;font-weight:900;letter-spacing:.02em;color:#16110a;background:linear-gradient(#ffe27a,#d99d19);box-shadow:0 12px 34px #0008}
  button.off{background:rgba(22,22,22,.76);color:#fff;backdrop-filter:blur(14px)}
  #badge{position:fixed;left:18px;top:calc(16px + env(safe-area-inset-top));z-index:6;border-radius:999px;padding:12px 18px;background:rgba(20,20,20,.58);color:white;font-weight:800;font-size:18px;backdrop-filter:blur(12px)}
  #badge.on{color:#ffd84f;border:1px solid rgba(255,216,79,.38)}
  #hint{position:fixed;right:14px;top:calc(17px + env(safe-area-inset-top));z-index:6;border-radius:999px;padding:12px 15px;background:rgba(20,20,20,.5);color:#fff;font-weight:700;font-size:15px;backdrop-filter:blur(12px);max-width:52vw;text-align:right}
</style>
</head>
<body>
<video id="video" autoplay playsinline muted></video>
<canvas id="view"></canvas>
<div id="badge">LIVE</div>
<div id="hint">press XRAY, point at can</div>
<div id="ui"><button id="live" class="off">LIVE</button><button id="xray">XRAY</button></div>
<script>
const video = document.getElementById('video');
const canvas = document.getElementById('view');
const ctx = canvas.getContext('2d', { alpha:false });
const badge = document.getElementById('badge');
const hint = document.getElementById('hint');
const xrayBtn = document.getElementById('xray');
const liveBtn = document.getElementById('live');
const sample = document.createElement('canvas');
sample.width = 144; sample.height = 216;
const sctx = sample.getContext('2d', { willReadFrequently:true });

let streamStarted=false, xray=false;
let W=1,H=1, dpr=1;
let gamma=0, beta=0;
let box = {x:.29,y:.16,w:.48,h:.70, conf:0};
let lastDetect=0;
let frame=0;
const imgs = ['front_open.jpg','left_open.jpg','right_open.jpg','close_detail.jpg'].map(n=>{
  const im=new Image(); im.src='assets/'+n; return im;
});

function resize(){
  dpr = Math.min(devicePixelRatio||1, 2);
  W = Math.round(innerWidth*dpr); H = Math.round(innerHeight*dpr);
  canvas.width=W; canvas.height=H;
}
addEventListener('resize', resize); resize();

async function startCamera(){
 if(streamStarted) return;
 try{
   const st = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:{ideal:'environment'}, width:{ideal:1920}, height:{ideal:1080} }, audio:false });
   video.srcObject = st; streamStarted=true;
 }catch(e){ hint.textContent='camera permission needed'; }
}

async function askMotion(){
 try{
  if(typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function') await DeviceOrientationEvent.requestPermission();
 }catch(e){}
}
addEventListener('deviceorientation', e=>{ gamma=e.gamma||0; beta=e.beta||0; });

function drawVideoCover(){
  if(!video.videoWidth){ ctx.fillStyle='#111'; ctx.fillRect(0,0,W,H); return; }
  const vw=video.videoWidth, vh=video.videoHeight;
  const scale=Math.max(W/vw,H/vh), dw=vw*scale, dh=vh*scale;
  ctx.drawImage(video,(W-dw)/2,(H-dh)/2,dw,dh);
}

function autoDetectCan(){
  if(!video.videoWidth) return;
  sctx.drawImage(video,0,0,sample.width,sample.height);
  const w=sample.width,h=sample.height;
  const data=sctx.getImageData(0,0,w,h).data;
  let minX=w,maxX=0,minY=h,maxY=0,count=0;
  // Weighted detector for large grey/silver closed cans, avoiding white wall and dark UI.
  for(let y=Math.floor(h*.10); y<h*.92; y++){
    for(let x=Math.floor(w*.08); x<w*.92; x++){
      const i=(y*w+x)*4, r=data[i], g=data[i+1], b=data[i+2];
      const mx=Math.max(r,g,b), mn=Math.min(r,g,b), sat=(mx-mn)/(mx+1);
      const grey=Math.abs(r-g)+Math.abs(g-b)+Math.abs(r-b);
      // silver can: low saturation, medium/bright, not pure white wall
      if(sat<.18 && grey<42 && mx>82 && mx<222){
        // prefer central/lower cryostat zone, not ceiling/UI
        const cx=Math.abs((x/w)-.52), cy=Math.abs((y/h)-.52);
        if(cx<.42 && cy<.43){
          minX=Math.min(minX,x); maxX=Math.max(maxX,x); minY=Math.min(minY,y); maxY=Math.max(maxY,y); count++;
        }
      }
    }
  }
  const area=(maxX-minX)*(maxY-minY);
  const conf=count/(w*h);
  let nb;
  if(count>850 && area>w*h*.045){
    let x=minX/w, y=minY/h, bw=(maxX-minX)/w, bh=(maxY-minY)/h;
    // Convert loose grey bounds into the expected OVC body volume.
    x = Math.max(.08, x-.035); y = Math.max(.08, y-.015);
    bw = Math.min(.78, bw+.07); bh = Math.min(.82, bh+.04);
    // if huge wall was detected, fall back to central cryostat volume
    if(bw>.75 || bh>.88 || bw<.22 || bh<.36) nb={x:.30,y:.16,w:.47,h:.70,conf:.15};
    else nb={x,y,w:bw,h:bh,conf:Math.min(1,conf*12)};
  } else {
    nb={x:.30,y:.16,w:.47,h:.70,conf:0};
  }
  // Smooth; keep it stable so it feels attached.
  const a = nb.conf>.18 ? .10 : .035;
  box.x=box.x*(1-a)+nb.x*a; box.y=box.y*(1-a)+nb.y*a; box.w=box.w*(1-a)+nb.w*a; box.h=box.h*(1-a)+nb.h*a; box.conf=nb.conf;
}

function canPath(x,y,w,h){
  const r=w*.31, top=h*.08;
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r*.72);
  ctx.lineTo(x+w,y+h-r*.72);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r*.72);
  ctx.lineTo(x,y+r*.72);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawXray(){
  const x=box.x*W, y=box.y*H, w=box.w*W, h=box.h*H;
  // Select view using phone angle. Center = user's best open-fridge view.
  let im=imgs[0];
  if(gamma>10) im=imgs[1]; else if(gamma<-10) im=imgs[2];
  if(Math.abs(beta)>38 && imgs[3].complete) im=imgs[3];

  ctx.save();
  canPath(x,y,w,h);
  ctx.clip();

  // Remove closed can only inside the can volume: paint over it with the real open-fridge image.
  ctx.globalAlpha=.985;
  const parX=gamma*0.004*w, parY=(beta-35)*0.0018*h;
  const iw=im.naturalWidth||800, ih=im.naturalHeight||1200;
  const scale=Math.max((w*1.20)/iw,(h*1.14)/ih);
  const dw=iw*scale, dh=ih*scale;
  const dx=x+(w-dw)/2 + parX;
  const dy=y-h*.045 + parY; // attach top cold plate to the can top
  ctx.drawImage(im,dx,dy,dw,dh);

  // Make it read as being behind glass / inside the still-present fridge.
  const grad=ctx.createRadialGradient(x+w*.48,y+h*.32,w*.08,x+w*.50,y+h*.48,w*.68);
  grad.addColorStop(0,'rgba(255,231,151,.10)');
  grad.addColorStop(.52,'rgba(255,213,80,.035)');
  grad.addColorStop(1,'rgba(0,0,0,.13)');
  ctx.fillStyle=grad; ctx.fillRect(x,y,w,h);
  ctx.restore();

  // Re-add top rim/attachment cue without drawing a capsule.
  ctx.save();
  ctx.globalAlpha=.34;
  ctx.strokeStyle='rgba(255,210,64,.55)';
  ctx.lineWidth=Math.max(1.2*dpr, w*.006);
  ctx.beginPath();
  ctx.ellipse(x+w/2, y+h*.055, w*.39, h*.035, 0, Math.PI, Math.PI*2);
  ctx.stroke();
  ctx.restore();

  // very subtle edge shadow: implies the object exists inside the cylindrical can, not on screen.
  ctx.save();
  canPath(x,y,w,h); ctx.clip();
  const edge=ctx.createLinearGradient(x,y,x+w,y);
  edge.addColorStop(0,'rgba(0,0,0,.20)'); edge.addColorStop(.16,'rgba(0,0,0,0)'); edge.addColorStop(.84,'rgba(0,0,0,0)'); edge.addColorStop(1,'rgba(0,0,0,.20)');
  ctx.fillStyle=edge; ctx.fillRect(x,y,w,h);
  ctx.restore();
}

function loop(t){
  frame++;
  ctx.setTransform(1,0,0,1,0,0);
  drawVideoCover();
  if(xray){
    if(t-lastDetect>180){ autoDetectCan(); lastDetect=t; }
    drawXray();
    hint.textContent = box.conf>.18 ? 'auto can replacement' : 'point at closed can';
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

xrayBtn.onclick=async()=>{
  await startCamera(); await askMotion();
  xray=true; badge.textContent='XRAY ON'; badge.classList.add('on');
};
liveBtn.onclick=()=>{ xray=false; badge.textContent='LIVE'; badge.classList.remove('on'); hint.textContent='press XRAY, point at can'; };

// No controls, but a double-tap cycles source view if the current angle looks wrong.
let lastTap=0, forced=-1;
canvas.addEventListener('touchend',()=>{
  const now=Date.now();
  if(now-lastTap<280){ forced=(forced+1)%imgs.length; const tmp=imgs.splice(forced,1)[0]; imgs.unshift(tmp); }
  lastTap=now;
});
</script>
</body>
</html>
