<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FridgeXR True AR Prototype</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:system-ui,-apple-system,Segoe UI,sans-serif;color:white}#wrap{position:fixed;inset:0}video,canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.hud{position:fixed;left:0;right:0;bottom:calc(18px + env(safe-area-inset-bottom));display:flex;justify-content:center;gap:12px;pointer-events:none}.btn{pointer-events:auto;border:0;border-radius:999px;padding:18px 28px;font-weight:900;font-size:19px;letter-spacing:.06em;color:#140e04;background:linear-gradient(#ffd96a,#b88316);box-shadow:0 10px 35px #0009,0 0 35px #c98b1888}.btn.off{background:#242832;color:white}.top{position:fixed;top:calc(12px + env(safe-area-inset-top));left:12px;right:12px;display:flex;justify-content:space-between;align-items:center;pointer-events:none}.pill{background:#111a;border:1px solid #fff3;border-radius:999px;padding:8px 12px;backdrop-filter:blur(10px);font-size:13px}.mini{position:fixed;right:10px;bottom:calc(92px + env(safe-area-inset-bottom));background:#111a;border:1px solid #fff3;border-radius:16px;padding:10px;backdrop-filter:blur(12px);display:none;min-width:210px}.mini.show{display:block}.mini label{display:grid;color:#ddd;font-size:12px;margin:7px 0}.mini input{accent-color:#d9a32f}.gear{pointer-events:auto;border:1px solid #fff3;border-radius:999px;background:#111b;color:white;padding:9px 12px}.note{position:fixed;left:12px;bottom:calc(92px + env(safe-area-inset-bottom));max-width:310px;background:#111a;border:1px solid #fff3;border-radius:16px;padding:10px;backdrop-filter:blur(12px);font-size:12px;line-height:1.25;color:#ddd}.hide{display:none}</style>
</head>
<body><div id="wrap"><video id="v" autoplay playsinline muted></video><canvas id="c"></canvas></div>
<div class="top"><div class="pill" id="status">Tap Start</div><button class="gear" id="gear">Calibrate</button></div>
<div class="note" id="note">This prototype renders a procedural 3D-like dilution-fridge chandelier, not a still photo. Move the phone: the plates and wiring shift in perspective.</div>
<div class="mini" id="mini"><label>Window X <input id="wx" type="range" min="20" max="80" value="50"></label><label>Window Y <input id="wy" type="range" min="20" max="75" value="47"></label><label>Window size <input id="ws" type="range" min="30" max="95" value="66"></label><label>Depth/parallax <input id="depth" type="range" min="10" max="100" value="48"></label><label>Strip strength <input id="strip" type="range" min="70" max="100" value="96"></label></div>
<div class="hud"><button class="btn off" id="start">START</button><button class="btn" id="xray">XRAY</button></div>
<script>
const video=document.getElementById('v'), canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
let running=false,xray=false,tiltX=0,tiltY=0,manualX=0,manualY=0;
const ids=['wx','wy','ws','depth','strip']; const ctl=Object.fromEntries(ids.map(id=>[id,document.getElementById(id)]));
function val(id){return +ctl[id].value}
async function start(){try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false});video.srcObject=s;running=true;document.getElementById('status').textContent='Camera live';document.getElementById('start').classList.remove('off');document.getElementById('start').textContent='LIVE'; if(window.DeviceOrientationEvent&&DeviceOrientationEvent.requestPermission){try{await DeviceOrientationEvent.requestPermission()}catch(e){}}}catch(e){alert('Camera needs HTTPS and permission. '+e.message)}}
window.addEventListener('deviceorientation',e=>{if(e.gamma!=null){tiltX=e.gamma/35;tiltY=(e.beta-55)/45}});window.addEventListener('mousemove',e=>{manualX=(e.clientX/innerWidth-.5)*1.2;manualY=(e.clientY/innerHeight-.5)*1.2});
function project(p,cx,cy,scale,viewX,viewY){let [x,y,z]=p; let f=1/(1+z*.0018); return [cx+(x+viewX*z*.38)*scale*f, cy+(y+viewY*z*.25)*scale*f, f]}
function ellipse(cx,cy,rx,ry,fill,stroke,lw=2){ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.fillStyle=fill;ctx.fill(); if(stroke){ctx.lineWidth=lw;ctx.strokeStyle=stroke;ctx.stroke()}}
function line(a,b,col,w){ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);ctx.strokeStyle=col;ctx.lineWidth=w;ctx.stroke()}
function drawChandelier(cx,cy,scale,viewX,viewY){
 const gold=ctx.createLinearGradient(0,cy-scale*2,0,cy+scale*2);gold.addColorStop(0,'#fff1a3');gold.addColorStop(.25,'#d29a22');gold.addColorStop(.55,'#f5ce55');gold.addColorStop(1,'#8d5b09');
 const dark='rgba(83,54,4,.75)', steel='rgba(220,225,220,.92)', copper='rgba(196,98,37,.8)', blue='rgba(5,80,190,.95)';
 const levels=[[-390,1.05],[-205,.88],[-35,.74],[150,.58],[315,.38]];
 // back rods
 for(let i=0;i<8;i++){let a=i/8*Math.PI*2;let r=155;let x=Math.cos(a)*r,y=Math.sin(a)*32;let p1=project([x,y,levels[0][0]-70],cx,cy,scale,viewX,viewY);let p2=project([x,y,levels[4][0]+40],cx,cy,scale,viewX,viewY);line(p1,p2,steel,2.2*p1[2])}
 // copper braids behind
 for(let side of [-1,1]) for(let i=0;i<5;i++){let pts=[];for(let t=0;t<28;t++){let z=-330+t*17;let x=side*(58+i*10)+Math.sin(t*.7+i)*8;let y=-30+Math.cos(t*.5)*12;pts.push(project([x,y,z],cx,cy,scale,viewX,viewY))}ctx.beginPath();pts.forEach((p,j)=>j?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]));ctx.strokeStyle=copper;ctx.lineWidth=1.4;ctx.stroke()}
 // plates
 for(const [z,rad] of levels){let p=project([0,0,z],cx,cy,scale,viewX,viewY);ellipse(p[0],p[1],rad*scale*p[2],rad*scale*.20*p[2],gold,'rgba(255,237,158,.95)',2.5*p[2]);ellipse(p[0],p[1]-5*p[2],rad*.72*scale*p[2],rad*.12*scale*p[2],'rgba(255,246,186,.18)','rgba(94,59,5,.35)',1*p[2]);
   for(let i=0;i<20;i++){let a=i/20*Math.PI*2;let hp=project([Math.cos(a)*rad*118,Math.sin(a)*rad*24,z-2],cx,cy,scale,viewX,viewY);ellipse(hp[0],hp[1],2.2*p[2],1.1*p[2],'rgba(75,45,0,.7)')}
 }
 // dense coax/wires at front
 for(let i=0;i<34;i++){let x=-118+i*7;let y=-16+Math.sin(i)*5;let top=project([x,y,-355],cx,cy,scale,viewX,viewY), bot=project([x+Math.sin(i*.8)*16,y+Math.cos(i)*10,145+Math.sin(i)*60],cx,cy,scale,viewX,viewY);line(top,bot,i%5==0?'rgba(35,120,255,.85)':(i%3==0?'rgba(240,235,215,.8)':'rgba(180,180,170,.75)'),i%5==0?2.2:1.15)}
 // blue component from user's photos
 let bp=project([0,-20,35],cx,cy,scale,viewX,viewY);ctx.save();ctx.translate(bp[0],bp[1]);ctx.rotate(viewX*.10);ctx.fillStyle=blue;ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=2;roundRect(-58*scale*bp[2],-34*scale*bp[2],116*scale*bp[2],68*scale*bp[2],8*scale*bp[2]);ctx.fill();ctx.stroke();ctx.restore();
 // lower experimental payload, golden not silver cans
 let lp=project([0,15,360],cx,cy,scale,viewX,viewY);ctx.fillStyle='rgba(218,164,44,.95)';roundRect(lp[0]-32*scale*lp[2],lp[1]-26*scale*lp[2],64*scale*lp[2],52*scale*lp[2],7*scale*lp[2]);ctx.fill();ctx.strokeStyle='rgba(255,232,130,.8)';ctx.stroke();
}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r)}
function frameMask(cx,cy,w,h){ctx.beginPath();ctx.roundRect(cx-w/2,cy-h/2,w,h,Math.min(w,h)*.09)}
function draw(){requestAnimationFrame(draw);canvas.width=innerWidth*devicePixelRatio;canvas.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);ctx.clearRect(0,0,innerWidth,innerHeight);if(!xray)return;
 const cx=innerWidth*val('wx')/100, cy=innerHeight*val('wy')/100, w=innerWidth*val('ws')/100, h=w*1.25; let vx=(tiltX||manualX)*val('depth')/48, vy=(tiltY||manualY)*val('depth')/48;
 ctx.save();frameMask(cx,cy,w,h);ctx.clip();
 // strip: opaque frosted replacement hides cans/OVC, leaves slight glass feel
 ctx.fillStyle=`rgba(8,10,12,${val('strip')/100})`;ctx.fillRect(cx-w/2,cy-h/2,w,h);
 let g=ctx.createRadialGradient(cx-w*.18,cy-h*.25,10,cx,cy,w*.65);g.addColorStop(0,'rgba(255,230,130,.28)');g.addColorStop(.45,'rgba(20,20,18,.45)');g.addColorStop(1,'rgba(0,0,0,.85)');ctx.fillStyle=g;ctx.fillRect(cx-w/2,cy-h/2,w,h);
 drawChandelier(cx,cy+h*.04,w/380,vx,vy);
 ctx.fillStyle='rgba(255,255,255,.07)';ctx.fillRect(cx-w*.47,cy-h*.47,w*.06,h*.92);ctx.fillStyle='rgba(255,255,255,.045)';ctx.fillRect(cx+w*.36,cy-h*.47,w*.08,h*.92);
 ctx.restore();
 ctx.strokeStyle='rgba(255,210,88,.8)';ctx.lineWidth=2;frameMask(cx,cy,w,h);ctx.stroke();
}
document.getElementById('start').onclick=start;document.getElementById('xray').onclick=()=>{xray=!xray;document.getElementById('xray').classList.toggle('off',!xray);document.getElementById('note').classList.toggle('hide',xray);document.getElementById('status').textContent=xray?'XRAY vision on':'Camera live'};document.getElementById('gear').onclick=()=>document.getElementById('mini').classList.toggle('show');draw();
</script></body></html>
