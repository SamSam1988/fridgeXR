<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Dilution Fridge Strip AR</title>
  <style>
    :root { --bg:#050607; --panel:#121722dd; --text:#fff8e8; --muted:#c9c0ad; --gold:#d8aa3b; --mirror:1; }
    * { box-sizing:border-box; }
    html, body { margin:0; height:100%; background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,Segoe UI,sans-serif; overflow:hidden; }
    #stage { position:fixed; inset:0; background:#000; touch-action:none; }
    video, #stripLayer, #dimLayer, #frameLayer { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
    video { transform:scaleX(var(--mirror)); }
    #dimLayer { pointer-events:none; background:rgba(0,0,0,.0); }
    #stripLayer { pointer-events:none; overflow:hidden; }
    #stripWindow { position:absolute; left:50%; top:50%; width:62vw; height:70vh; transform:translate(-50%,-50%) rotate(0deg); border-radius:18px; overflow:hidden; background:#050607; box-shadow:0 0 0 9999px rgba(0,0,0,.18), inset 0 0 34px rgba(255,210,100,.22); }
    #stripWindow img { position:absolute; left:50%; top:50%; width:100%; height:100%; object-fit:contain; transform:translate(-50%,-50%) scale(1); transform-origin:center; filter:saturate(1.18) contrast(1.08) brightness(1.02); }
    #frameLayer { pointer-events:none; }
    #outline { position:absolute; left:50%; top:50%; width:62vw; height:70vh; transform:translate(-50%,-50%) rotate(0deg); border:2px solid rgba(255,210,90,.72); border-radius:18px; box-shadow:0 0 18px rgba(255,190,60,.25); }
    .top { position:fixed; left:12px; right:12px; top:12px; display:flex; gap:8px; justify-content:space-between; align-items:center; }
    .badge { background:#121722cc; border:1px solid #ffffff25; border-radius:999px; padding:8px 12px; font-weight:800; backdrop-filter:blur(14px); }
    button, select { appearance:none; border:1px solid #ffffff30; background:#202735; color:var(--text); border-radius:12px; padding:10px 12px; font-weight:750; }
    button.primary { background:linear-gradient(180deg,#ffd66f,#b8861d); color:#1c1302; border-color:#ffe7a555; }
    .panel { position:fixed; left:10px; right:10px; bottom:10px; max-height:52vh; overflow:auto; background:var(--panel); border:1px solid #ffffff24; border-radius:18px; padding:12px; backdrop-filter:blur(16px); box-shadow:0 12px 45px #0009; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px 14px; }
    label { display:grid; gap:5px; font-size:12px; color:var(--muted); }
    input[type=range] { width:100%; accent-color:var(--gold); }
    .row { display:flex; gap:8px; margin-top:10px; }
    .row>* { flex:1; }
    .hint { font-size:12px; color:var(--muted); line-height:1.35; margin-top:8px; }
    @media (min-width:800px) { .panel { left:auto; width:455px; } }
  </style>
</head>
<body>
  <main id="stage">
    <video id="camera" autoplay playsinline muted></video>
    <div id="dimLayer"></div>
    <div id="stripLayer"><div id="stripWindow"><img id="openFridge" src="assets/front_full.jpg" alt="open fridge interior"></div></div>
    <div id="frameLayer"><div id="outline"></div></div>
  </main>
  <div class="top"><div class="badge">Strip AR / X-ray</div><button id="start" class="primary">Start camera</button></div>
  <section class="panel">
    <div class="grid">
      <label>Mode
        <select id="mode"><option value="strip">Strip: hide cans</option><option value="ghost">Ghost X-ray</option><option value="calibrate">Calibrate outline</option></select>
      </label>
      <label>Open-fridge image
        <select id="imageChoice"><option value="assets/front_full.jpg">Front full chandelier</option><option value="assets/front_medium.jpg">Front medium</option><option value="assets/detail_wiring.jpg">Wiring/detail</option><option value="assets/detail_bluebox.jpg">Blue box/detail</option></select>
      </label>
      <label>Window width <input id="winW" type="range" min="20" max="110" value="62"></label>
      <label>Window height <input id="winH" type="range" min="20" max="110" value="70"></label>
      <label>Window X <input id="winX" type="range" min="-50" max="50" value="0"></label>
      <label>Window Y <input id="winY" type="range" min="-50" max="50" value="0"></label>
      <label>Window rotate <input id="rot" type="range" min="-25" max="25" value="0"></label>
      <label>Interior scale <input id="imgScale" type="range" min="60" max="220" value="100"></label>
      <label>Interior X <input id="imgX" type="range" min="-80" max="80" value="0"></label>
      <label>Interior Y <input id="imgY" type="range" min="-80" max="80" value="0"></label>
      <label>Strip opacity <input id="opacity" type="range" min="0" max="100" value="100"></label>
      <label>Gold / contrast <input id="gold" type="range" min="70" max="180" value="118"></label>
    </div>
    <div class="row"><button id="mirror">Mirror</button><button id="hidePanel">Hide controls</button><button id="reset">Reset</button></div>
    <div class="hint">For the real AR feeling: line the golden outline with the fridge window, then use Strip mode. This masks the live camera inside the window, so the real cans/OVC are not visible there.</div>
  </section>
<script>
const $=id=>document.getElementById(id);
const video=$('camera'), win=$('stripWindow'), outline=$('outline'), img=$('openFridge'), dim=$('dimLayer');
const controls=['mode','imageChoice','winW','winH','winX','winY','rot','imgScale','imgX','imgY','opacity','gold'].map($);
let mirrored=false, panel=document.querySelector('.panel');
async function startCamera(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}, width:{ideal:1920}, height:{ideal:1080}}, audio:false});
    video.srcObject=stream;
  }catch(e){ alert('Camera failed. Deploy over HTTPS, then allow camera access. Details: '+e.message); }
}
function apply(){
  const w=$('winW').value, h=$('winH').value, x=$('winX').value, y=$('winY').value, r=$('rot').value;
  for (const el of [win, outline]) { el.style.width=w+'vw'; el.style.height=h+'vh'; el.style.transform=`translate(calc(-50% + ${x}vw), calc(-50% + ${y}vh)) rotate(${r}deg)`; }
  img.src=$('imageChoice').value;
  img.style.transform=`translate(calc(-50% + ${$('imgX').value}%), calc(-50% + ${$('imgY').value}%)) scale(${$('imgScale').value/100})`;
  img.style.opacity=$('opacity').value/100;
  img.style.filter=`saturate(${$('gold').value/100}) contrast(1.08) brightness(1.02)`;
  const mode=$('mode').value;
  if(mode==='strip') { win.style.background='#050607'; img.style.mixBlendMode='normal'; outline.style.opacity=.85; dim.style.background='rgba(0,0,0,.05)'; }
  if(mode==='ghost') { win.style.background='transparent'; img.style.mixBlendMode='screen'; outline.style.opacity=.45; dim.style.background='rgba(0,0,0,.0)'; }
  if(mode==='calibrate') { win.style.background='transparent'; img.style.mixBlendMode='normal'; img.style.opacity=.28; outline.style.opacity=1; dim.style.background='rgba(0,0,0,.0)'; }
  localStorage.setItem('fridgeStripSettings', JSON.stringify(Object.fromEntries(controls.map(el=>[el.id,el.value]))));
}
function restore(){ try{ const s=JSON.parse(localStorage.getItem('fridgeStripSettings')||'{}'); for(const [k,v] of Object.entries(s)) if($(k)) $(k).value=v; }catch{} apply(); }
controls.forEach(el=>el.addEventListener('input',apply));
$('start').onclick=startCamera;
$('mirror').onclick=()=>{ mirrored=!mirrored; document.documentElement.style.setProperty('--mirror', mirrored?-1:1); };
$('hidePanel').onclick=()=>{ panel.style.display='none'; setTimeout(()=>{ if(confirm('Show controls again?')) panel.style.display='block'; }, 100); };
$('reset').onclick=()=>{ localStorage.removeItem('fridgeStripSettings'); location.reload(); };
restore();
</script>
</body>
</html>
