<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>fridgeXR v16</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;touch-action:none}
  #cam{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;background:#000;z-index:0}
  #dress{position:fixed;z-index:3;pointer-events:none;opacity:.96;overflow:hidden;
    border-radius:50% 50% 13% 13%/7% 7% 4% 4%;
    transform-origin:50% 0%;
    filter:contrast(1.04) saturate(1.12) drop-shadow(0 0 12px rgba(255,190,40,.16));
    transition:left .10s linear, top .10s linear, width .10s linear, height .10s linear, transform .10s linear;
  }
  #dress::before{content:"";position:absolute;inset:0;border-radius:inherit;box-shadow:inset 0 0 24px rgba(255,230,120,.16), inset 0 0 90px rgba(255,255,255,.08);z-index:3;pointer-events:none}
  #fridge{position:absolute;left:50%;top:0;width:118%;height:106%;object-fit:cover;object-position:50% 0%;transform:translateX(-50%);opacity:.98;filter:brightness(1.03) contrast(1.08) saturate(1.22)}
  #attach{position:fixed;z-index:4;height:3px;background:rgba(255,210,70,.70);box-shadow:0 0 12px rgba(255,210,70,.55);opacity:.55;pointer-events:none;transition:left .10s linear, top .10s linear, width .10s linear, transform .10s linear}
  #status{position:fixed;left:14px;top:14px;z-index:10;padding:9px 13px;border-radius:999px;background:rgba(0,0,0,.42);color:#ffd84b;font-weight:900;font-size:15px;backdrop-filter:blur(8px);border:1px solid rgba(255,216,75,.18)}
  #hint{position:fixed;right:14px;top:14px;z-index:10;padding:9px 13px;border-radius:999px;background:rgba(0,0,0,.36);color:white;font-weight:750;font-size:14px;backdrop-filter:blur(8px);max-width:62vw;text-align:center}
  canvas{display:none}
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<div id="dress"><img id="fridge" src="assets/our_fridge_tight.jpg" alt="open fridge"></div>
<div id="attach"></div>
<div id="status">XRAY</div><div id="hint">point at closed can</div>
<canvas id="scan" width="128" height="224"></canvas>
<script>
const video=document.getElementById('cam');
const dress=document.getElementById('dress');
const attach=document.getElementById('attach');
const hint=document.getElementById('hint');
const scan=document.getElementById('scan');
const ctx=scan.getContext('2d',{willReadFrequently:true});
let state={cx:.50, top:.225, w:.44, h:.62, rot:0, found:false};
let smooth={...state};
async function startCamera(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false});
    video.srcObject=stream;
    await video.play().catch(()=>{});
  }catch(e){
    hint.textContent='allow camera / use https';
  }
}
startCamera();
function lerp(a,b,t){return a+(b-a)*t}
function apply(){
  for(const k of ['cx','top','w','h','rot']) smooth[k]=lerp(smooth[k],state[k],.32);
  const vw=innerWidth,vh=innerHeight;
  const w=smooth.w*vw, h=smooth.h*vh;
  const x=smooth.cx*vw, y=smooth.top*vh;
  dress.style.left=(x-w/2)+'px'; dress.style.top=y+'px'; dress.style.width=w+'px'; dress.style.height=h+'px';
  dress.style.transform=`perspective(820px) rotateY(${smooth.rot}deg) rotateX(-1.5deg)`;
  attach.style.left=(x-w*.47)+'px'; attach.style.width=(w*.94)+'px'; attach.style.top=(y+2)+'px'; attach.style.transform=`rotate(${smooth.rot*.04}deg)`;
  requestAnimationFrame(apply);
}
apply();
function pixelStats(d,W,x,y){
  const i=(y*W+x)*4, r=d[i], g=d[i+1], b=d[i+2];
  const max=Math.max(r,g,b), min=Math.min(r,g,b); return {r,g,b,br:(r+g+b)/3,sat:max-min};
}
function detect(){
  if(video.readyState<2)return;
  const W=scan.width,H=scan.height;
  ctx.drawImage(video,0,0,W,H);
  const img=ctx.getImageData(0,0,W,H), d=img.data;
  // 1) Estimate the closed can/cylinder body using bright low-saturation grey pixels.
  let minX=W,maxX=0,minY=H,maxY=0,count=0;
  for(let y=Math.floor(H*.08);y<Math.floor(H*.92);y++){
    for(let x=Math.floor(W*.08);x<Math.floor(W*.92);x++){
      const p=pixelStats(d,W,x,y);
      const centerBias=1-Math.min(1,Math.abs(x/W-.50)/.42);
      if(p.br>72 && p.br<236 && p.sat<48 && centerBias>.12){
        // keep likely large grey metal / OVC, not small white highlights only
        count++; if(x<minX)minX=x;if(x>maxX)maxX=x;if(y<minY)minY=y;if(y>maxY)maxY=y;
      }
    }
  }
  let foundBody=false;
  const bw=maxX-minX, bh=maxY-minY;
  if(count>850 && bw>W*.13 && bw<W*.72 && bh>H*.28){foundBody=true;}
  // 2) Find the horizontal opening seam/rim: strong horizontal edge high in the detected body.
  let yStart=Math.floor(H*.10), yEnd=Math.floor(H*.52), xStart=Math.floor(W*.18), xEnd=Math.floor(W*.82);
  if(foundBody){
    xStart=Math.max(4,minX-5); xEnd=Math.min(W-5,maxX+5);
    yStart=Math.max(8,Math.floor(minY-H*.04)); yEnd=Math.min(H-8,Math.floor(minY+bh*.42));
  }
  let bestY=yStart,bestScore=-1;
  for(let y=yStart+2;y<yEnd-2;y++){
    let score=0;
    for(let x=xStart+2;x<xEnd-2;x++){
      const p=pixelStats(d,W,x,y);
      const i1=((y-1)*W+x)*4, i2=((y+1)*W+x)*4;
      const g1=(d[i1]+d[i1+1]+d[i1+2])/3, g2=(d[i2]+d[i2+1]+d[i2+2])/3;
      const edge=Math.abs(g2-g1);
      // opening line/rim tends to be grey, low-sat, high horizontal contrast, near top.
      const grey=(p.sat<58 && p.br>55 && p.br<245)?1:0;
      const highBias=1-(y-yStart)/Math.max(1,(yEnd-yStart));
      score += edge*(.4+grey*.9)*(1+.35*highBias);
    }
    if(score>bestScore){bestScore=score;bestY=y;}
  }
  // 3) Use body width if possible, but anchor top exactly to detected opening line.
  if(foundBody){
    state.cx=((minX+maxX)/2)/W;
    state.top=Math.max(.07,Math.min(.50,bestY/H));
    state.w=Math.min(.62,Math.max(.28,(bw/W)*1.02));
    // extend downward from opening line to can lower area, not beyond screen
    const desiredBottom=Math.min(.94,(maxY/H)+.02);
    state.h=Math.min(.82,Math.max(.43,desiredBottom-state.top));
    state.rot=(state.cx-.5)*-15;
    state.found=true;
    hint.textContent='opening line matched';
  }else{
    // Fail-safe: always show XRAY in a plausible closed-can area, but no controls.
    state={cx:.50, top:.22, w:.44, h:.62, rot:0, found:false};
    hint.textContent='searching for can';
  }
}
setInterval(detect,140);
window.addEventListener('resize',()=>{});
window.addEventListener('deviceorientation',e=>{const g=e.gamma||0; state.rot=Math.max(-9,Math.min(9,state.rot-g*.06));});
</script>
</body>
</html>
