<style>
  html, body {

    text-align: center;
    background: linear-gradient(transparent, rgba(0,0,0,0.55));
    pointer-events: none;
    transition: opacity 1.5s ease;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  }
  #hint.gone { opacity: 0; }
  #err {
    position: absolute; inset: 0;
    display: none; align-items: center; justify-content: center;
    padding: 24px; text-align: center; background: rgba(0,0,0,0.75);
    font-size: 15px; line-height: 1.5;
  }
  #err.show { display: flex; }

        audio: false
      });
      v.srcObject = stream;
    } catch (e) {
      let msg = 'Camera unavailable: ' + (e && e.message ? e.message : e);
      if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
        msg += '<br><br>This page must be served over HTTPS for the camera to work. Open it on Netlify, GitHub Pages, or any HTTPS host.';
      } else {
        msg += '<br><br>Tap to retry, or check your browser permissions.';
      }
      err.innerHTML = msg;
      err.classList.add('show');
      err.addEventListener('click', () => { err.classList.remove('show'); startCam(); }, { once: true });
    }
  }
  startCam();

  // Fade hint after 6 seconds
  setTimeout(() => hint.classList.add('gone'), 6000);

  // Gesture handling
  const pts = new Map();
  let g = null;

  function down(e) {
    e.preventDefault();
    o.setPointerCapture(e.pointerId);
    pts.set(e.pointerId, { x: e.clientX, y: e.clientY });
    begin();
    hint.classList.add('gone');
  }
  function move(e) {
    if (!pts.has(e.pointerId)) return;
    pts.set(e.pointerId, { x: e.clientX, y: e.clientY });
    upd();
  }
  function up(e) {
    if (!pts.has(e.pointerId)) return;
    pts.delete(e.pointerId);
    if (pts.size === 0) { g = null; save(); }
    else begin();
  }

  function begin() {
    if (pts.size === 1) {
      const [p] = pts.values();
      g = { kind: 'pan', sx: p.x, sy: p.y, tx: S.tx, ty: S.ty };
    } else if (pts.size >= 2) {
      const [a, b] = [...pts.values()];
      const dx = b.x - a.x, dy = b.y - a.y;
      g = {
        kind: 'pinch',
        sd: Math.hypot(dx, dy),
        sa: Math.atan2(dy, dx),
        sscale: S.scale, srot: S.rot,
        tx: S.tx, ty: S.ty,
      };
    }
  }

  function upd() {
    if (!g) return;
    if (g.kind === 'pan' && pts.size === 1) {
      const [p] = pts.values();
      S.tx = g.tx + (p.x - g.sx);
      S.ty = g.ty + (p.y - g.sy);
    } else if (g.kind === 'pinch' && pts.size >= 2) {
      const [a, b] = [...pts.values()];
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.hypot(dx, dy);
      const ang = Math.atan2(dy, dx);
      S.scale = Math.max(0.1, Math.min(8, g.sscale * (d / g.sd)));
      S.rot = g.srot + (ang - g.sa) * 180 / Math.PI;
    }
    apply();
  }

  o.addEventListener('pointerdown', down);
  o.addEventListener('pointermove', move);
  o.addEventListener('pointerup', up);
  o.addEventListener('pointercancel', up);

  // Block iOS native pinch-zoom on the page itself
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('touchmove', e => {
    if (e.touches.length > 1) e.preventDefault();
  }, { passive: false });

  // Double-tap on the overlay resets alignment
  let lastTap = 0;
  o.addEventListener('pointerup', (e) => {
    const now = Date.now();
    if (now - lastTap < 300) {
      S.tx = 0; S.ty = 0; S.scale = 1; S.rot = 0;
      apply(); save();
    }
    lastTap = now;
  });
})();
</script>

</body>
</html>
