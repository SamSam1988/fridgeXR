<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>FridgeXR v13</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;touch-action:none}
  #cam{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;background:#000}
  #scene{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity .18s ease;overflow:hidden}
  body.xr #scene{opacity:1}
  #canMask{position:absolute;left:50%;top:49%;width:44vw;height:66vh;transform:translate(-50%,-50%);border-radius:48% 48% 30% 30%/14% 14% 7% 7%;overflow:hidden;filter:drop-shadow(0 10px 18px rgba(0,0,0,.25));}
  #canWash{position:absolute;inset:0;background:rgba(190,190,170,.10);backdrop-filter:blur(1.2px) saturate(.8) brightness(1.06);}
  #fridge{position:absolute;left:50%;top:43%;height:111%;width:auto;transform:translate(-50%,-50%) scale(1.04);filter:saturate(1.15) contrast(1.08) drop-shadow(0 4px 6px rgba(0,0,0,.22));opacity:.96;mix-blend-mode:normal}
  #topJoin{position:absolute;left:13%;right:13%;top:5%;height:8%;border-top:2px solid rgba(255,218,96,.58);background:linear-gradient(to bottom,rgba(255,205,66,.24),rgba(255,205,66,0));border-radius:50%;}
  #rim{position:absolute;inset:0;border:1.5px solid rgba(255,215,85,.38);border-radius:inherit;box-shadow:inset 0 0 28px rgba(255,220,120,.08)}
  #ui{position:fixed;left:0;right:0;bottom:calc(18px + env(safe-area-inset-bottom));display:flex;justify-content:center;z-index:4;pointer-events:auto}
  #xray{border:0;border-radius:999px;background:linear-gradient(#ffd85f,#d8a923);color:#16110a;font-size:28px;font-weight:900;padding:20px 54px;letter-spacing:.04em;box-shadow:0 12px 35px rgba(0,0,0,.38)}
  #badge{position:fixed;left:18px;top:calc(16px + env(safe-area-inset-top));z-index:4;color:#fff;background:rgba(0,0,0,.48);border-radius:999px;padding:12px 16px;font-size:18px;font-weight:800;backdrop-filter:blur(12px)}
  body.xr #badge{color:#ffd84d;border:1px solid rgba(255,216,77,.28)}
  #hint{position:fixed;right:16px;top:calc(16px + env(safe-area-inset-top));z-index:4;color:#fff;background:rgba(0,0,0,.42);border-radius:999px;padding:12px 16px;font-size:16px;font-weight:700;backdrop-filter:blur(12px);max-width:48vw;text-align:center}
  body.xr #hint{display:none}
  #debug{display:none}
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<div id="scene">
  <div id="canMask">
    <div id="canWash"></div>
    <img id="fridge" src="assets/user_chandelier_clean.png" alt="" />
    <div id="topJoin"></div>
    <div id="rim"></div>
  </div>
</div>
<div id="badge">LIVE</div>
<div id="hint">point at closed fridge</div>
<div id="ui"><button id="xray">XRAY</button></div>
<canvas id="debug" width="160" height="240"></canvas>
<script>
const video=document.getElementById('cam');
const body=document.body, badge=document.getElementById('badge'), mask=document.getElementById('canMask'), fridge=document.getElementById('fridge');
let xr=false, lastBox=null, smooth={cx:.50,cy:.49,w:.44,h:.66};

async function start(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false});
    video.srcObject=s;
  }catch(e){badge.textContent='CAMERA BLOCKED'; alert('Camera needs HTTPS/GitHub Pages and permission. '+e.message)}
}
start();

document.getElementById('xray').onclick=()=>{xr=!xr;body.classList.toggle('xr',xr);badge.textContent=xr?'XRAY ON':'LIVE'};

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function applyBox(b){
  smooth.cx=smooth.cx*.82+b.cx*.18; smooth.cy=smooth.cy*.82+b.cy*.18; smooth.w=smooth.w*.86+b.w*.14; smooth.h=smooth.h*.86+b.h*.14;
  mask.style.left=(smooth.cx*100)+'vw'; mask.style.top=(smooth.cy*100)+'vh'; mask.style.width=(smooth.w*100)+'vw'; mask.style.height=(smooth.h*100)+'vh';
}
function fallback(){applyBox({cx:.50,cy:.50,w:.43,h:.64})}
function detectCan(){
  if(!xr || video.readyState<2){requestAnimationFrame(detectCan);return}
  const c=document.getElementById('debug'), ctx=c.getContext('2d',{willReadFrequently:true});
  ctx.drawImage(video,0,0,c.width,c.height);
  const img=ctx.getImageData(0,0,c.width,c.height).data;
  let minX=999,minY=999,maxX=0,maxY=0,n=0;
  // Look for the closed can: neutral gray/silver, vertical, near image center; ignore walls by searching central band.
  for(let y=Math.floor(c.height*.18); y<c.height*.88; y++){
    for(let x=Math.floor(c.width*.25); x<c.width*.78; x++){
      const i=(y*c.width+x)*4, r=img[i], g=img[i+1], b=img[i+2];
      const mx=Math.max(r,g,b), mn=Math.min(r,g,b), sat=(mx-mn)/(mx+1), val=mx/255;
      const centerBias=1-Math.abs((x/c.width)-.52)*1.7;
      if(sat<.16 && val>.32 && val<.88 && centerBias>.15){
        minX=Math.min(minX,x); maxX=Math.max(maxX,x); minY=Math.min(minY,y); maxY=Math.max(maxY,y); n++;
      }
    }
  }
  if(n>900){
    let cx=((minX+maxX)/2)/c.width, cy=((minY+maxY)/2)/c.height;
    let w=(maxX-minX)/c.width*1.10, h=(maxY-minY)/c.height*1.04;
    // Keep only plausible can-sized masks. This prevents full-screen black/window failures.
    w=clamp(w,.30,.52); h=clamp(h,.46,.76); cx=clamp(cx,.32,.68); cy=clamp(cy,.36,.63);
    applyBox({cx,cy,w,h});
  } else fallback();
  requestAnimationFrame(detectCan);
}
detectCan();

window.addEventListener('deviceorientation',e=>{
  if(!xr)return;
  const g=e.gamma||0, b=e.beta||0;
  const dx=clamp(g*.45,-12,12), dy=clamp((b-55)*.12,-8,8);
  fridge.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px)) scale(${1.05+Math.abs(g)*.0015}) rotate(${g*.045}deg)`;
});
</script>
</body>
</html>
