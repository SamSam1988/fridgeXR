<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>FridgeXR</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;touch-action:none}
  #cam{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;background:#000}
  #void{position:fixed;inset:0;opacity:0;pointer-events:none;transition:opacity .28s ease;background:radial-gradient(ellipse at 50% 49%,rgba(0,0,0,.97) 0%,rgba(0,0,0,.95) 34%,rgba(0,0,0,.82) 48%,rgba(0,0,0,.30) 60%,rgba(0,0,0,0) 72%)}
  #portal{position:fixed;left:50%;top:50%;width:min(86vw,520px);height:min(74vh,720px);transform:translate(-50%,-50%);border-radius:28px;overflow:hidden;opacity:0;pointer-events:none;transition:opacity .28s ease, box-shadow .28s ease;box-shadow:0 0 0 2px rgba(244,190,55,.85),0 0 36px rgba(245,191,55,.25),inset 0 0 80px rgba(0,0,0,.9);background:radial-gradient(ellipse at center,#181818 0%,#050505 70%)}
  .layer{position:absolute;left:50%;top:50%;width:104%;height:104%;object-fit:contain;transform:translate(-50%,-50%);filter:contrast(1.08) saturate(1.22) drop-shadow(0 0 22px rgba(255,200,70,.24));will-change:transform}
  #main{z-index:3}.back{z-index:1;opacity:.62;filter:blur(.7px) saturate(1.4) brightness(.78)}.front{z-index:5;opacity:.78;filter:contrast(1.2) saturate(1.35) drop-shadow(0 0 16px rgba(255,210,80,.35))}
  #glass{position:absolute;inset:0;z-index:8;background:linear-gradient(115deg,transparent 0%,transparent 38%,rgba(255,255,255,.20) 43%,rgba(255,255,255,.04) 50%,transparent 56%),radial-gradient(circle at 47% 40%,rgba(255,200,70,.14),transparent 35%);mix-blend-mode:screen;pointer-events:none}
  #grain{position:absolute;inset:0;z-index:9;opacity:.13;background:repeating-radial-gradient(circle at center,rgba(255,210,80,.22) 0 1px,transparent 1px 7px);pointer-events:none}
  #top{position:fixed;top:calc(12px + env(safe-area-inset-top));left:14px;right:14px;display:flex;justify-content:space-between;z-index:20;pointer-events:none}
  .pill{background:rgba(0,0,0,.45);color:#fff;border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(12px);padding:10px 14px;border-radius:999px;font-weight:700;font-size:16px}
  #ui{position:fixed;left:0;right:0;bottom:calc(22px + env(safe-area-inset-bottom));display:flex;justify-content:center;z-index:20}
  #xray{border:0;border-radius:999px;padding:20px 46px;background:linear-gradient(#ffd85e,#c49216);color:#15100a;font-weight:900;font-size:28px;letter-spacing:.04em;box-shadow:0 12px 38px rgba(0,0,0,.45)}
  #help{position:fixed;left:14px;right:14px;bottom:calc(104px + env(safe-area-inset-bottom));z-index:20;color:#fff;text-align:center;font-size:13px;line-height:1.3;text-shadow:0 1px 6px #000;opacity:.86;pointer-events:none}
  body.on #void{opacity:1} body.on #portal{opacity:1} body.on #help{opacity:0}
  @media(min-width:700px){#portal{width:520px;height:720px}}
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<div id="void"></div>
<div id="portal">
  <img id="back1" class="layer back" src="assets/chandelier_alt1.png" alt="">
  <img id="main" class="layer" src="assets/chandelier_main.png" alt="">
  <img id="front1" class="layer front" src="assets/chandelier_alt2.png" alt="">
  <div id="glass"></div><div id="grain"></div>
</div>
<div id="top"><div id="state" class="pill">LIVE VIEW</div><div class="pill">FridgeXR</div></div>
<div id="help">Point at the closed fridge window, then press XRAY.</div>
<div id="ui"><button id="xray">XRAY</button></div>
<script>
const cam=document.getElementById('cam'), portal=document.getElementById('portal'), body=document.body, state=document.getElementById('state');
const layers=[document.getElementById('back1'),document.getElementById('main'),document.getElementById('front1')];
let on=false, ox=0, oy=0, tick=0;
async function camera(){try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false});cam.srcObject=s;}catch(e){state.textContent='CAMERA BLOCKED';alert('Camera needs HTTPS. On GitHub Pages this should work. Allow camera access and reload.');}}
camera();
function render(){tick+=.018; const breath=Math.sin(tick)*3; const glow=1+Math.sin(tick*.8)*.035;
  layers[0].style.transform=`translate(calc(-50% + ${-ox*.45}px),calc(-50% + ${-oy*.32+breath}px)) scale(${1.18+glow*.015}) rotate(${ox*.012}deg)`;
  layers[1].style.transform=`translate(calc(-50% + ${ox*.18}px),calc(-50% + ${oy*.12-breath*.4}px)) scale(${1.02+glow*.01}) rotate(${ox*.006}deg)`;
  layers[2].style.transform=`translate(calc(-50% + ${ox*.72}px),calc(-50% + ${oy*.55-breath}px)) scale(${.82+glow*.012}) rotate(${ox*.018}deg)`;
  requestAnimationFrame(render);
} render();
function setMotion(x,y){ox=x; oy=y; portal.style.transform=`translate(calc(-50% + ${x*.08}px),calc(-50% + ${y*.05}px)) perspective(800px) rotateY(${x*.025}deg) rotateX(${-y*.018}deg)`;}
window.addEventListener('deviceorientation',e=>{setMotion((e.gamma||0)*3,(e.beta||0)*1.4-35);});
window.addEventListener('pointermove',e=>{setMotion((e.clientX/innerWidth-.5)*120,(e.clientY/innerHeight-.5)*90);});
document.getElementById('xray').onclick=()=>{on=!on;body.classList.toggle('on',on);state.textContent=on?'XRAY VISION':'LIVE VIEW';};
</script>
</body>
</html>
